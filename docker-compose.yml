services:
  ventixe.frontend:
    build:
      context: ./ventixereact 
      dockerfile: Dockerfile
    ports:
      - "5173:5173"

  ventixe.account:
    image: ${DOCKER_REGISTRY-}ventixeaccount
    build:
      context: .
      dockerfile: account-service/Presentation/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:8081;http://+:8080
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ventixe_main;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    ports:
      - "5001:8080"
      - "5002:8081"
    volumes:
      - ${USERPROFILE}\.aspnet\https:/https:ro
    depends_on:
      postgres:
        condition: service_healthy

  ventixe.ai:
    image: ${DOCKER_REGISTRY-}ventixeai
    build:
      context: .
      dockerfile: Ventixe.AI.Service/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ventixe_main;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - OpenAI__ApiKey=${OPENAI_API_KEY}
    ports:
      - "5011:8080"
    depends_on:
      postgres:
        condition: service_healthy

  ventixe.auth:
    image: ${DOCKER_REGISTRY-}ventixeauth
    build:
      context: .
      dockerfile: auth-service/Presentation/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:8081;http://+:8080
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ventixe_main;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    ports:
      - "7001:8080"
      - "7002:8081"
    volumes:
      - ${USERPROFILE}\.aspnet\https:/https:ro
    depends_on:
      postgres:
        condition: service_healthy

  ventixe.booking:
    image: ${DOCKER_REGISTRY-}ventixebooking
    build:
      context: .
      dockerfile: booking-service/Presentation/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:8081;http://+:8080
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ventixe_main;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    ports:
      - "5003:8080"
      - "5004:8081"
    volumes:
      - ${USERPROFILE}\.aspnet\https:/https:ro
    depends_on:
      postgres:
        condition: service_healthy

  ventixe.event:
    image: ${DOCKER_REGISTRY-}ventixeevent
    build:
      context: .
      dockerfile: event-service/Presentation/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:8081;http://+:8080
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ventixe_main;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    ports:
      - "5005:8080"
      - "5006:8081"
    volumes:
      - ${USERPROFILE}\.aspnet\https:/https:ro
    depends_on:
      postgres:
        condition: service_healthy

  ventixe.user:
    image: ${DOCKER_REGISTRY-}ventixeuser
    build:
      context: .
      dockerfile: user-service/Presentation/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:8081;http://+:8080
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ventixe_main;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    ports:
      - "5007:8080"
      - "5008:8081"
    volumes:
      - ${USERPROFILE}\.aspnet\https:/https:ro
    depends_on:
      postgres:
        condition: service_healthy

  ventixe.verify:
    image: ${DOCKER_REGISTRY-}ventixeverify
    build:
      context: .
      dockerfile: verification-provider-service/Presentation/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:8081;http://+:8080
      - ASPNETCORE_Kestrel__Certificates__Default__Password=${CERT_PASSWORD}
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ventixe_main;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    ports:
      - "5009:8080"
      - "5010:8081"
    volumes:
      - ${USERPROFILE}\.aspnet\https:/https:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: ventixe-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=ventixe_main
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
